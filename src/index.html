<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' file: blob:;" />
    <title>Elegant Clock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="transparent">
    <main id="app-shell" class="app-shell">
      <header class="titlebar">
        <div class="brand">
          <span class="brand-mark">◷</span>
          <span>Elegant Clock</span>
        </div>
        <div class="window-actions">
          <button id="hide-btn" type="button" title="隐藏到状态栏">⌄</button>
          <button id="minimize-btn" type="button" title="最小化">—</button>
          <button id="maximize-btn" type="button" title="最大化/还原">□</button>
          <button id="close-btn" type="button" title="关闭">×</button>
        </div>
      </header>

      <section id="clock-panel" class="clock-panel" aria-label="当前时间">
        <p id="current-date" class="date-text">--</p>
        <h1 id="current-time" class="time-text">--:--:--</h1>
      </section>

      <nav class="quick-actions" aria-label="快速入口">
        <button id="settings-toggle" class="icon-button" type="button" title="显示设置" aria-controls="controls-drawer" aria-expanded="false">⚙</button>
        <button id="tools-toggle" class="icon-button" type="button" title="其他功能" aria-controls="controls-drawer" aria-expanded="false">☰</button>
      </nav>

      <details id="controls-drawer" class="controls-drawer" data-panel="tools">
        <summary class="drawer-summary" aria-hidden="true" tabindex="-1">
          <span>展开设置和工具</span>
          <small>显示、铃声、番茄钟、倒计时、正计时、提醒</small>
        </summary>

        <div class="drawer-content">
          <details id="appearance-card" class="tool-card" data-panel-item="settings" aria-label="显示设置">
            <summary class="section-heading">
              <h2>显示设置</h2>
              <span id="appearance-status" class="status-text">可自定义</span>
            </summary>

            <div class="card-body">
              <div class="settings-panel">
                <label class="switch-row">
                  <input id="transparent-toggle" type="checkbox" />
                  <span>透明显示</span>
                </label>
                <label class="switch-row">
                  <input id="always-top-toggle" type="checkbox" />
                  <span>窗口置顶</span>
                </label>
                <label class="switch-row">
                  <input id="autostart-toggle" type="checkbox" />
                  <span>开机自启动</span>
                </label>
              </div>

              <p id="autostart-status" class="settings-hint">正在读取自启动状态…</p>

              <div class="input-grid two-cols">
                <label>
                  透明度
                  <span class="range-row">
                    <input id="opacity-input" type="range" min="20" max="100" step="1" value="78" />
                    <span id="opacity-value" class="value-chip">78%</span>
                  </span>
                </label>
                <label>
                  时钟字体大小
                  <span class="range-row">
                    <input id="font-size-input" type="range" min="48" max="160" step="1" value="82" />
                    <span id="font-size-value" class="value-chip">82px</span>
                  </span>
                </label>
              </div>

              <div class="input-grid two-cols">
                <label>
                  字体
                  <input id="font-family-input" type="text" list="font-presets" placeholder="系统默认" />
                  <datalist id="font-presets">
                    <option value="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"></option>
                    <option value="Microsoft YaHei, Segoe UI, sans-serif"></option>
                    <option value="Noto Sans CJK SC, Noto Sans, sans-serif"></option>
                    <option value="Arial, Helvetica, sans-serif"></option>
                    <option value="Georgia, serif"></option>
                    <option value="Consolas, Cascadia Mono, monospace"></option>
                  </datalist>
                </label>
                <label>
                  铃声
                  <span id="ringtone-label" class="readonly-field">默认：ringtone_default.mp3</span>
                </label>
              </div>

              <div class="input-grid three-cols">
                <label>
                  字体颜色
                  <input id="font-color-input" type="color" value="#f8fbff" />
                </label>
                <label>
                  背景颜色
                  <input id="background-color-input" type="color" value="#101623" />
                </label>
                <label>
                  铃声操作
                  <span class="mini-button-row">
                    <button id="ringtone-choose" type="button">选择</button>
                    <button id="ringtone-test" type="button">试听</button>
                    <button id="ringtone-default" type="button">默认</button>
                  </span>
                </label>
              </div>

              <div class="about-settings-row">
                <div>
                  <strong>关于</strong>
                  <p>查看作者主页、项目主页和开源协议。</p>
                </div>
                <button id="about-open" type="button">打开关于</button>
              </div>
            </div>
          </details>

          <details class="tool-card" data-panel-item="tools" aria-label="番茄钟">
            <summary class="section-heading">
              <h2>番茄钟</h2>
              <span id="pomodoro-status" class="status-text">待开始</span>
            </summary>

            <div class="card-body">
              <div class="pomodoro-summary">
                <span id="pomodoro-phase" class="pill">专注</span>
                <span id="pomodoro-cycle" class="status-text">已完成 0 个番茄</span>
              </div>

              <div class="input-grid four-cols">
                <label>
                  专注分钟
                  <input id="pomodoro-focus-input" type="number" min="1" max="180" step="1" value="25" />
                </label>
                <label>
                  短休息
                  <input id="pomodoro-short-input" type="number" min="1" max="60" step="1" value="5" />
                </label>
                <label>
                  长休息
                  <input id="pomodoro-long-input" type="number" min="1" max="120" step="1" value="15" />
                </label>
                <label>
                  长休间隔
                  <input id="pomodoro-long-every-input" type="number" min="1" max="12" step="1" value="4" />
                </label>
              </div>

              <output id="pomodoro-display" class="timer-display">25:00</output>
              <div class="button-row four-buttons">
                <button id="pomodoro-start" type="button">开始</button>
                <button id="pomodoro-pause" type="button">暂停</button>
                <button id="pomodoro-skip" type="button">跳过</button>
                <button id="pomodoro-reset" type="button">重置</button>
              </div>
            </div>
          </details>

          <details class="tool-card" data-panel-item="tools" aria-label="倒计时">
            <summary class="section-heading">
              <h2>倒计时</h2>
              <span id="countdown-status" class="status-text">待开始</span>
            </summary>

            <div class="card-body">
              <div class="mode-row" role="radiogroup" aria-label="倒计时模式">
                <label>
                  <input type="radio" name="countdown-mode" value="duration" checked />
                  时长
                </label>
                <label>
                  <input type="radio" name="countdown-mode" value="target" />
                  指定日期
                </label>
              </div>

              <div id="duration-fields" class="input-grid three-cols">
                <label>
                  小时
                  <input id="hours-input" type="number" min="0" max="999" step="1" value="0" />
                </label>
                <label>
                  分钟
                  <input id="minutes-input" type="number" min="0" max="59" step="1" value="5" />
                </label>
                <label>
                  秒
                  <input id="seconds-input" type="number" min="0" max="59" step="1" value="0" />
                </label>
              </div>

              <div id="target-fields" class="input-grid" hidden>
                <label>
                  目标日期时间
                  <input id="target-input" type="datetime-local" />
                </label>
              </div>

              <output id="countdown-display" class="timer-display">00:05:00</output>
              <div class="button-row">
                <button id="countdown-start" type="button">开始</button>
                <button id="countdown-pause" type="button">暂停</button>
                <button id="countdown-reset" type="button">重置</button>
              </div>
            </div>
          </details>

          <details class="tool-card" data-panel-item="tools" aria-label="正计时">
            <summary class="section-heading">
              <h2>正计时</h2>
              <span id="stopwatch-status" class="status-text">待开始</span>
            </summary>

            <div class="card-body">
              <output id="stopwatch-display" class="timer-display">00:00:00.0</output>
              <div class="button-row">
                <button id="stopwatch-start" type="button">开始</button>
                <button id="stopwatch-pause" type="button">暂停</button>
                <button id="stopwatch-reset" type="button">重置</button>
              </div>
            </div>
          </details>

          <details class="tool-card" data-panel-item="tools" aria-label="提醒">
            <summary class="section-heading">
              <h2>提醒</h2>
              <span id="reminder-status" class="status-text">暂无提醒</span>
            </summary>

            <div class="card-body">
              <div class="input-grid">
                <label>
                  标题
                  <input id="reminder-title-input" type="text" maxlength="60" placeholder="例如：开会、喝水、休息" />
                </label>
                <label>
                  提醒时间
                  <input id="reminder-time-input" type="datetime-local" />
                </label>
                <label>
                  备注
                  <textarea id="reminder-note-input" maxlength="200" rows="2" placeholder="可选：补充提醒内容"></textarea>
                </label>
              </div>

              <div class="button-row">
                <button id="reminder-add" type="button">添加提醒</button>
                <button id="reminder-clear-done" type="button">清除已提醒</button>
              </div>
              <ul id="reminder-list" class="reminder-list" aria-live="polite"></ul>
            </div>
          </details>

          <footer class="footer-note">
            <span>GPL-3.0-only</span>
            <span id="version-label">v--</span>
          </footer>
        </div>
      </details>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
