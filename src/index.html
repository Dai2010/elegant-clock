<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' file: blob:;" />
    <title>Elegant Clock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="transparent">
    <main id="app-shell" class="app-shell clock-only-shell">
      <header class="titlebar">
        <div class="brand">
          <span class="brand-mark">◷</span>
          <span>Elegant Clock</span>
        </div>
        <div class="window-actions">
          <button id="hide-btn" type="button" title="隐藏到状态栏">⌄</button>
          <button id="minimize-btn" type="button" title="最小化">—</button>
          <button id="maximize-btn" type="button" title="最大化/还原">□</button>
          <button id="close-btn" type="button" title="关闭">×</button>
        </div>
      </header>

      <section id="clock-panel" class="clock-panel" aria-label="当前时间">
        <p id="current-date" class="date-text">--</p>
        <h1 id="current-time" class="time-text">--:--:--</h1>
        <p id="countdown-summary" class="countdown-summary" hidden>倒计时 --</p>
      </section>

      <nav class="quick-actions" aria-label="快速入口">
        <button id="settings-toggle" class="icon-button" type="button" title="打开设置窗口" aria-label="打开设置窗口">⚙</button>
        <button id="tools-toggle" class="icon-button" type="button" title="打开功能窗口" aria-label="打开功能窗口">☰</button>
      </nav>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
